name: Audit - Git ↔ Supabase Drift Detection

on:
  # Déclencher manuellement
  workflow_dispatch:

  # Déclencher tous les jours à 08:00 UTC
  schedule:
    - cron: '0 8 * * *'

  # Déclencher après chaque push sur main
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/audit-migration-drift.yml'
      - 'scripts/audit-migration-drift.mjs'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Detect Git ↔ Supabase drift
    runs-on: ubuntu-latest

    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: "2.109.1"

      # ── Link au projet Supabase ──────────────────────────────────────────
      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # ── Lancer l'audit ───────────────────────────────────────────────────
      - name: Run drift detection audit
        id: audit
        run: |
          node scripts/audit-migration-drift.mjs
          echo "exit_code=$?" >> "$GITHUB_OUTPUT" || true

      # ── Commenter sur une PR si drift détecté ────────────────────────────
      - name: Comment on PR if drift detected
        if: |
          failure() &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Audit Supabase** : Une dérive a été détectée entre Git et Supabase.\n\nVérifiez les détails dans le [workflow](${context.payload.pull_request.html_url}/checks?check_run_id=${context.job}).`
            })

      # ── Rapport résumé ───────────────────────────────────────────────────
      - name: Generate summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<MARKDOWN
          ## Audit en cours

          - **Statut** : ${{ steps.audit.outcome }}
          - **Détails** : Voir les logs ci-dessous
          MARKDOWN
