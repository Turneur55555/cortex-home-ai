name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Épinglé (au lieu de "latest") — même correctif que migrate.yml :
          # la résolution de "latest" appelle l'API GitHub (rate-limitable),
          # une version fixe télécharge directement l'asset.
          version: "2.109.1"

      - name: Deploy all edge functions
        run: |
          supabase functions deploy \
            analyze-pdf \
            analyze-image \
            chat \
            cleanup-pdfs \
            coach-workout \
            muscle-readiness \
            recipe-assistant \
            scan-fridge \
            scan-meal \
            generate-weekly-report \
            scheduled-weekly-report \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
