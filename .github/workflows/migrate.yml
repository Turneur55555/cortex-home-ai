name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Repair orphaned remote migrations
        # Détecte les versions présentes dans schema_migrations mais absentes
        # localement (suite à une suppression accidentelle de fichier) et les
        # marque comme "reverted" pour débloquer le push suivant.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          LOCAL_VERSIONS=$(ls supabase/migrations/*.sql \
            | xargs -I{} basename {} \
            | grep -oP '^\d+' \
            | sort)

          REMOTE_VERSIONS=$(supabase migration list \
            --project-ref "$PROJECT_REF" \
            --output json 2>/dev/null \
            | jq -r '.[] | select(.local_version == null) | .remote_version' \
            2>/dev/null || echo "")

          if [ -z "$REMOTE_VERSIONS" ]; then
            echo "✅ Aucune migration orpheline détectée"
          else
            for VERSION in $REMOTE_VERSIONS; do
              echo "🔧 Réparation migration orpheline: $VERSION"
              supabase migration repair \
                --project-ref "$PROJECT_REF" \
                --status reverted \
                "$VERSION"
            done
          fi

      - name: Push migrations
        run: supabase db push --yes --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket pdfs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Récupérer le service_role key via le CLI Supabase (déjà authentifié)
          SERVICE_KEY=$(supabase projects api-keys \
            --project-ref "$PROJECT_REF" \
            --output json \
            | jq -r '.[] | select(.name == "service_role") | .api_key')

          echo "::add-mask::$SERVICE_KEY"

          if [ -z "$SERVICE_KEY" ] || [ "$SERVICE_KEY" = "null" ]; then
            echo "Impossible d'obtenir le service_role key"
            exit 1
          fi

          # Créer le bucket via l'API Storage REST du projet
          STATUS=$(curl -s -o /tmp/bucket_resp.json -w "%{http_code}" \
            -X POST \
            "https://${PROJECT_REF}.supabase.co/storage/v1/bucket" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "id": "pdfs",
              "name": "pdfs",
              "public": false,
              "file_size_limit": 52428800,
              "allowed_mime_types": ["application/pdf"]
            }')

          cat /tmp/bucket_resp.json
          echo ""

          # 200/201 = créé, 400 = déjà existant ("The resource already exists")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "400" ]; then
            echo "Bucket pdfs OK (HTTP $STATUS)"
          else
            echo "Erreur création bucket (HTTP $STATUS)"
            exit 1
          fi
