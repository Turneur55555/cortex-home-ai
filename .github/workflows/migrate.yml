name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: write   # auto-commit des corrections idempotentes
  pull-requests: write

# ─── Job 1 : Validation statique ────────────────────────────────────────────
jobs:
  validate:
    name: Validate migrations (static)
    runs-on: ubuntu-latest
    outputs:
      fixes_applied: ${{ steps.validate.outputs.fixes_applied }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Nécessaire pour pousser les auto-corrections
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run static validator
        id: validate
        run: |
          node scripts/validate-supabase.mjs --fix --ci
          if git diff --quiet supabase/migrations/; then
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
          else
            echo "fixes_applied=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-commit idempotency fixes
        if: steps.validate.outputs.fixes_applied == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "ci: auto-fix migration idempotency [skip ci]"
          git push

      - name: Fail on unfixed issues (PR only)
        if: steps.validate.outputs.fixes_applied == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::Des migrations non-idempotentes ont été détectées."
          echo "Lancez 'npm run validate:supabase:fix' localement et committez les corrections."
          exit 1

# ─── Job 2 : Push vers Supabase (main uniquement) ───────────────────────────
  migrate:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          # Épinglé (au lieu de "latest") : la résolution de "latest" appelle
          # l'API GitHub pour lister les releases de supabase/cli, ce qui a
          # déjà échoué en prod avec "rate limit exceeded" (run 28934605199,
          # 08/07/2026) avant même d'atteindre le push des migrations. Une
          # version fixe télécharge directement l'asset, sans cet appel API.
          version: "2.109.1"

      # ── 1. Link ────────────────────────────────────────────────────────────
      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_REF"

      # ── 2. Détecter et réparer les migrations orphelines ──────────────────
      #
      # POURQUOI set +e ici :
      #   GitHub Actions exécute chaque `run:` avec bash -eo pipefail.
      #   `supabase migration list` peut retourner un exit code non-zéro
      #   (ex. 13 = erreur réseau/auth dans le CLI Go) et `|| echo "[]"`
      #   ne suffit pas à l'absorber dans tous les contextes de pipeline.
      #   On désactive temporairement le bail-on-error pour capturer
      #   proprement le code retour et diagnostiquer l'erreur réelle.
      #
      # POURQUOI jq au lieu de node --input-type=module <<'EOF' :
      #   La syntaxe `echo "$RAW" | node --input-type=module <<'EOF'` est
      #   un bug bash : le heredoc redirige stdin de node (pour le script JS),
      #   ce qui prive le pipe de lecteur. echo écrit dans le vide → SIGPIPE
      #   (signal 13). Avec set -eo pipefail, le job meurt avec exit 13.
      #   jq est préinstallé sur ubuntu-latest et n'a pas ce problème.
      - name: Repair orphaned remote migrations
        id: repair
        run: |
          echo "Récupération de la liste des migrations distantes..."

          # ── Appel CLI avec capture complète (stdout + stderr) ──────────
          set +e
          RAW=$(supabase migration list \
            --linked \
            --output json 2>&1)
          SUPABASE_EXIT=$?
          set -e

          if [ "$SUPABASE_EXIT" -ne 0 ]; then
            echo "⚠️  supabase migration list a retourné exit code $SUPABASE_EXIT"
            echo "   Sortie brute (5 premières lignes) :"
            echo "$RAW" | head -5 | sed 's/^/     /'
            echo "   → Réparation ignorée (le push détectera les orphelins si besoin)"
            exit 0
          fi

          # ── Vérifications défensives du contenu ────────────────────────
          if [ -z "$RAW" ]; then
            echo "⚠️  Réponse vide — aucune migration distante connue"
            exit 0
          fi

          # Extraire uniquement la portion JSON (ignore les éventuels warnings ANSI)
          JSON_PART=$(echo "$RAW" | grep -o '\[.*' | head -1 || true)
          if [ -z "$JSON_PART" ]; then
            JSON_PART="$RAW"
          fi

          # Valider la syntaxe JSON avec jq (disponible nativement sur ubuntu-latest)
          if ! echo "$JSON_PART" | jq empty 2>/dev/null; then
            echo "⚠️  Réponse non-JSON de supabase migration list :"
            echo "$RAW" | head -10 | sed 's/^/     /'
            echo "   → Réparation ignorée"
            exit 0
          fi

          # ── Extraction des orphelins avec jq ───────────────────────────
          # status "REMOTE_ONLY" = présent sur le remote mais absent en local
          # Supabase CLI peut aussi utiliser des champs sans .status (ancien format)
          ORPHANED=$(echo "$JSON_PART" | jq -r '
            if type == "array" then
              .[]
              | select(
                  (.status // "") == "REMOTE_ONLY"
                  or (
                    (.local // .local_path // null) == null
                    and (.remote // .remote_version // null) != null
                  )
                )
              | (.version // .remote // .remote_version // "")
              | select(length > 0)
            else
              empty
            end
          ' 2>/dev/null || true)

          # ── Réparation ─────────────────────────────────────────────────
          if [ -z "$ORPHANED" ]; then
            echo "✅ Aucune migration orpheline"
          else
            echo "🔧 Migrations orphelines détectées :"
            while IFS= read -r VERSION; do
              [ -z "$VERSION" ] && continue
              echo "   → $VERSION"
              set +e
              supabase migration repair \
                --linked \
                --status reverted \
                "$VERSION"
              REPAIR_EXIT=$?
              set -e
              if [ "$REPAIR_EXIT" -eq 0 ]; then
                echo "   ✅ Réparée"
              else
                echo "   ⚠️  Réparation ignorée (exit $REPAIR_EXIT) — le push retentera"
              fi
            done <<< "$ORPHANED"
          fi

      # ── 3. Push avec retry exponentiel ────────────────────────────────────
      #
      # BUG CORRIGÉ (audit du 2026-07-18) : `db push` n'accepte PAS
      # `--project-ref` (seul `--linked` existe dans le CLI 2.109.1 — le
      # projet est déjà lié par `supabase link` ci-dessus) : la commande
      # échouait systématiquement et silencieusement, ET `if cmd | tee f;
      # then` vérifiait le code retour de `tee` (toujours 0) plutôt que
      # celui de `cmd`, faisant état d'un faux succès à chaque run. Aucune
      # migration n'a donc jamais été réellement poussée par ce job.
      # `set -o pipefail` restaure la propagation du code retour réel.
      - name: Push migrations (with retry)
        id: push
        run: |
          set -o pipefail
          MAX=3
          DELAY=10
          for attempt in $(seq 1 $MAX); do
            echo "════════════════════════════════════════"
            echo "Tentative $attempt/$MAX — $(date -u '+%H:%M:%S UTC')"
            echo "════════════════════════════════════════"

            # Capturer stdout + stderr dans un fichier de log
            if supabase db push --yes --include-all \
                 --linked \
                 2>&1 | tee /tmp/push_output.txt; then
              echo "✅ Push réussi (tentative $attempt)"
              echo "success=true" >> "$GITHUB_OUTPUT"
              break
            fi

            echo "❌ Tentative $attempt échouée"
            cat /tmp/push_output.txt

            # ── Détection automatique des causes connues ─────────────────
            OUTPUT=$(cat /tmp/push_output.txt)

            # Cause : migration orpheline détectée en cours de push
            if echo "$OUTPUT" | grep -q "Remote migration versions not found"; then
              ORPHAN=$(echo "$OUTPUT" \
                | grep -oP 'supabase migration repair --status reverted \K\d+' \
                | head -1)
              if [ -n "$ORPHAN" ]; then
                echo "🔧 Auto-repair migration orpheline : $ORPHAN"
                supabase migration repair \
                  --linked \
                  --status reverted \
                  "$ORPHAN" || true
                DELAY=2
              fi
            fi

            # Cause : conflit de fonction (retente sans attente)
            if echo "$OUTPUT" | grep -qE "function .+ does not exist|42883"; then
              echo "⚠️  Fonction manquante — vérifier validate-supabase.mjs"
            fi

            # Cause : relation/policy/trigger déjà existante
            if echo "$OUTPUT" | grep -qE "already exists|42710|42P16"; then
              echo "⚠️  Objet déjà existant — migrations non-idempotentes"
            fi

            if [ "$attempt" -eq "$MAX" ]; then
              echo "success=false" >> "$GITHUB_OUTPUT"
              echo "::error::Push Supabase échoué après $MAX tentatives"
              exit 1
            fi

            echo "⏳ Attente ${DELAY}s avant la prochaine tentative..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done

      # ── 4. Créer le bucket pdfs (idempotent) ──────────────────────────────
      - name: Ensure storage bucket pdfs
        if: steps.push.outputs.success == 'true'
        run: |
          SERVICE_KEY=$(supabase projects api-keys \
            --project-ref "$PROJECT_REF" \
            --output json \
            | jq -r '.[] | select(.name == "service_role") | .api_key')

          echo "::add-mask::$SERVICE_KEY"

          if [ -z "$SERVICE_KEY" ] || [ "$SERVICE_KEY" = "null" ]; then
            echo "Impossible d'obtenir le service_role key"
            exit 1
          fi

          # Vérifie d'abord l'existence du bucket (GET) pour éviter de déclencher
          # une violation de contrainte "buckets_pkey" côté Postgres à chaque run
          # (le POST de création est bien idempotent côté HTTP mais logue quand
          # même une vraie ERROR Postgres quand le bucket existe déjà).
          EXISTS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${PROJECT_REF}.supabase.co/storage/v1/bucket/pdfs" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "apikey: ${SERVICE_KEY}")

          if [ "$EXISTS_STATUS" = "200" ]; then
            echo "✅ Bucket pdfs déjà existant, rien à faire"
          else
            STATUS=$(curl -s -o /tmp/bucket_resp.json -w "%{http_code}" \
              -X POST \
              "https://${PROJECT_REF}.supabase.co/storage/v1/bucket" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "apikey: ${SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{
                "id": "pdfs",
                "name": "pdfs",
                "public": false,
                "file_size_limit": 52428800,
                "allowed_mime_types": ["application/pdf"]
              }')

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "✅ Bucket pdfs créé (HTTP $STATUS)"
            else
              echo "Erreur bucket (HTTP $STATUS) :"
              cat /tmp/bucket_resp.json
              exit 1
            fi
          fi

      # ── 4b. Vérifier que types.ts correspond à la base (post-migration) ───
      # Les migrations viennent d'être appliquées : la base contient désormais
      # les nouvelles tables. types.ts committé DOIT correspondre — sinon on a
      # oublié de régénérer (`npm run gen:types`). Échec visible, aucun commit.
      #
      # IMPORTANT : ce check s'exécute TOUJOURS (même si le push échoue), car
      # on veut s'assurer qu'en cas de retry du push, types.ts sera conforme.
      # Un push échoué sans check types.ts laisse la CI en état inconsistant.
      - name: Setup Node (vérif types)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vérifier que types.ts correspond à la base
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/check-supabase-types.mjs

      # ── 5. GitHub Step Summary ────────────────────────────────────────────
      - name: Generate summary
        if: always()
        run: |
          PUSH_OK="${{ steps.push.outputs.success }}"
          MIGS=$(ls supabase/migrations/*.sql | wc -l)
          STATUS_EMOJI="✅"
          [ "$PUSH_OK" != "true" ] && STATUS_EMOJI="❌"

          cat >> "$GITHUB_STEP_SUMMARY" <<MARKDOWN
          ## ${STATUS_EMOJI} Supabase Migrations

          | | |
          |---|---|
          | **Status** | ${PUSH_OK:-false} |
          | **Migrations locales** | ${MIGS} |
          | **Commit** | \`${{ github.sha }}\` |
          | **Branche** | \`${{ github.ref_name }}\` |

          ### Dernières migrations
          \`\`\`
          $(ls -t supabase/migrations/*.sql | head -5 | xargs -I{} basename {} | sed 's/^/  /')
          \`\`\`
          MARKDOWN
