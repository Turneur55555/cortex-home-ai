name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulation (supabase db push --dry-run) : valide le pipeline et les accès SANS appliquer aucune migration"
        type: boolean
        default: true

permissions:
  contents: write   # auto-commit des corrections idempotentes
  pull-requests: write

# ─── Job 1 : Validation statique ────────────────────────────────────────────
jobs:
  validate:
    name: Validate migrations (static)
    runs-on: ubuntu-latest
    outputs:
      fixes_applied: ${{ steps.validate.outputs.fixes_applied }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Nécessaire pour pousser les auto-corrections
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run static validator
        id: validate
        run: |
          node scripts/validate-supabase.mjs --fix --ci
          if git diff --quiet supabase/migrations/; then
            echo "fixes_applied=false" >> "$GITHUB_OUTPUT"
          else
            echo "fixes_applied=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-commit idempotency fixes
        if: steps.validate.outputs.fixes_applied == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "ci: auto-fix migration idempotency [skip ci]"
          git push

      - name: Fail on unfixed issues (PR only)
        if: steps.validate.outputs.fixes_applied == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::Des migrations non-idempotentes ont été détectées."
          echo "Lancez 'npm run validate:supabase:fix' localement et committez les corrections."
          exit 1

# ─── Job 2 : Push vers Supabase (main uniquement) ───────────────────────────
  migrate:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    needs: validate
    # main (push réel) OU dispatch manuel (permet de valider le pipeline depuis
    # une branche, typiquement en dry-run, sans merger sur main).
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          # Épinglé (au lieu de "latest") : la résolution de "latest" appelle
          # l'API GitHub pour lister les releases de supabase/cli, ce qui a
          # déjà échoué en prod avec "rate limit exceeded" (run 28934605199,
          # 08/07/2026) avant même d'atteindre le push des migrations. Une
          # version fixe télécharge directement l'asset, sans cet appel API.
          version: "2.109.1"

      # ── 1. Link ────────────────────────────────────────────────────────────
      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_REF"

      # ── 2. Détecter (SANS réparer) les migrations orphelines ──────────────
      #
      # DÉCISION (18/07/2026) : ce workflow ne DOIT JAMAIS modifier
      # automatiquement l'historique de migrations (`migration repair`).
      # Une réparation automatique masque un problème de fond (divergence
      # code⇄base) et peut altérer silencieusement `schema_migrations`.
      # → Ici on se contente de DÉTECTER et de REPORTER les orphelines.
      #   La réconciliation est une opération MANUELLE et DOCUMENTÉE
      #   (voir docs/architecture/audit-integrite-base-migrations-2026-07-18.md).
      #
      # set +e : `supabase migration list` peut sortir en code non-zéro
      # (réseau/auth) ; on capture proprement sans faire échouer l'étape de
      # simple diagnostic. jq (préinstallé) évite le piège SIGPIPE des heredoc.
      - name: Detect orphaned remote migrations (report only)
        id: detect
        run: |
          echo "Diagnostic de l'historique de migrations (lecture seule, aucune réparation)..."
          set +e
          RAW=$(supabase migration list --linked --output json 2>&1)
          set -e

          JSON_PART=$(echo "$RAW" | grep -o '\[.*' | head -1 || true)
          [ -z "$JSON_PART" ] && JSON_PART="$RAW"
          if ! echo "$JSON_PART" | jq empty 2>/dev/null; then
            echo "ℹ️  Liste des migrations indisponible en JSON — diagnostic ignoré."
            echo "$RAW" | head -10 | sed 's/^/     /'
            exit 0
          fi

          ORPHANED=$(echo "$JSON_PART" | jq -r '
            if type == "array" then
              .[]
              | select(
                  (.status // "") == "REMOTE_ONLY"
                  or ((.local // .local_path // null) == null
                      and (.remote // .remote_version // null) != null)
                )
              | (.version // .remote // .remote_version // "")
              | select(length > 0)
            else empty end
          ' 2>/dev/null || true)

          if [ -z "$ORPHANED" ]; then
            echo "✅ Aucune migration orpheline détectée."
          else
            echo "⚠️  Migrations orphelines distantes (présentes en base, absentes du repo) :"
            echo "$ORPHANED" | sed 's/^/     👻 /'
            echo ""
            echo "   → Réconciliation MANUELLE requise (non exécutée ici, par conception)."
            echo "     Voir docs/architecture/audit-integrite-base-migrations-2026-07-18.md"
          fi

      # ── 3. Push avec retry exponentiel ────────────────────────────────────
      - name: Push migrations (with retry)
        id: push
        run: |
          # bash -eo pipefail est déjà le shell par défaut des runners GitHub,
          # mais on capture le code retour de `db push` explicitement via
          # PIPESTATUS pour ne JAMAIS dépendre du comportement du pipe `| tee`.
          set -uo pipefail
          MAX=3
          DELAY=10
          SUCCESS=false

          # Mode simulation : `--dry-run` exerce réellement la commande et la
          # connexion (valide les accès CI + prouve l'absence de faux positif)
          # mais n'applique AUCUNE migration. Actif uniquement via dispatch
          # manuel avec dry_run=true (défaut). Un push sur main applique bien.
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
            echo "🧪 MODE DRY-RUN — aucune migration ne sera appliquée."
          fi

          for attempt in $(seq 1 $MAX); do
            echo "════════════════════════════════════════"
            echo "Tentative $attempt/$MAX — $(date -u '+%H:%M:%S UTC')"
            echo "════════════════════════════════════════"

            # Projet déjà lié (étape « Link Supabase project ») → pas de
            # --project-ref (flag INVALIDE pour `db push`, provoquait un dump
            # d'aide + exit 0 = faux succès). On cible le projet lié.
            set +e
            supabase db push --linked --include-all --yes $DRY 2>&1 | tee /tmp/push_output.txt
            PUSH_EXIT=${PIPESTATUS[0]}
            set -e

            OUTPUT=$(cat /tmp/push_output.txt)

            # ── Garde-fou anti-faux-succès ───────────────────────────────
            # Certaines erreurs d'arguments font sortir la CLI en code 0 tout
            # en affichant l'aide. On force l'échec si l'aide/le rejet de flag
            # apparaît, quel que soit le code retour.
            if echo "$OUTPUT" | grep -qiE "Unrecognized flag|Help requested|^Usage:|Try rerunning the command with --debug"; then
              echo "❌ La CLI a rejeté la commande (flag invalide / aide affichée) — traité comme ÉCHEC."
              PUSH_EXIT=1
            fi

            if [ "$PUSH_EXIT" -eq 0 ]; then
              echo "✅ Push réussi (tentative $attempt)"
              SUCCESS=true
              break
            fi

            echo "❌ Tentative $attempt échouée (exit $PUSH_EXIT)"

            # ── Erreurs DÉTERMINISTES : ne jamais retenter ni réparer ────
            # Ces causes ne se résolvent pas toutes seules ; retenter ne
            # ferait que masquer le problème. On échoue immédiatement, avec
            # un diagnostic clair. AUCUN `migration repair` automatique :
            # la réconciliation d'historique est manuelle et documentée.
            if echo "$OUTPUT" | grep -q "Remote migration versions not found"; then
              echo "::error::Historique de migrations divergent — des versions"
              echo "::error::distantes sont absentes du repo (orphelines). Réconciliation"
              echo "::error::MANUELLE requise, voir docs/architecture/audit-integrite-base-migrations-2026-07-18.md"
              echo "::error::Ce workflow ne répare PAS l'historique automatiquement (par conception)."
              break
            fi
            if echo "$OUTPUT" | grep -qE "already exists|42710|42P16"; then
              echo "::error::Objet déjà existant (migration non idempotente ou déjà appliquée"
              echo "::error::sous un autre numéro de version). Échec volontaire — pas de retry."
              break
            fi
            if echo "$OUTPUT" | grep -qE "function .+ does not exist|42883"; then
              echo "::error::Fonction référencée manquante — dépendance non satisfaite."
              break
            fi

            # ── Sinon : erreur potentiellement transitoire (réseau) → retry ─
            if [ "$attempt" -eq "$MAX" ]; then
              break
            fi

            echo "⏳ Attente ${DELAY}s avant la prochaine tentative (erreur possiblement transitoire)..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done

          if [ "$SUCCESS" = "true" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "::error::Push Supabase échoué après $MAX tentatives"
            exit 1
          fi

      # ── 4. Créer le bucket pdfs (idempotent) ──────────────────────────────
      #      Sauté en dry-run (rien n'a été appliqué, aucun effet attendu).
      - name: Ensure storage bucket pdfs
        if: steps.push.outputs.success == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          SERVICE_KEY=$(supabase projects api-keys \
            --project-ref "$PROJECT_REF" \
            --output json \
            | jq -r '.[] | select(.name == "service_role") | .api_key')

          echo "::add-mask::$SERVICE_KEY"

          if [ -z "$SERVICE_KEY" ] || [ "$SERVICE_KEY" = "null" ]; then
            echo "Impossible d'obtenir le service_role key"
            exit 1
          fi

          # Vérifie d'abord l'existence du bucket (GET) pour éviter de déclencher
          # une violation de contrainte "buckets_pkey" côté Postgres à chaque run
          # (le POST de création est bien idempotent côté HTTP mais logue quand
          # même une vraie ERROR Postgres quand le bucket existe déjà).
          EXISTS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${PROJECT_REF}.supabase.co/storage/v1/bucket/pdfs" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "apikey: ${SERVICE_KEY}")

          if [ "$EXISTS_STATUS" = "200" ]; then
            echo "✅ Bucket pdfs déjà existant, rien à faire"
          else
            STATUS=$(curl -s -o /tmp/bucket_resp.json -w "%{http_code}" \
              -X POST \
              "https://${PROJECT_REF}.supabase.co/storage/v1/bucket" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "apikey: ${SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{
                "id": "pdfs",
                "name": "pdfs",
                "public": false,
                "file_size_limit": 52428800,
                "allowed_mime_types": ["application/pdf"]
              }')

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "✅ Bucket pdfs créé (HTTP $STATUS)"
            else
              echo "Erreur bucket (HTTP $STATUS) :"
              cat /tmp/bucket_resp.json
              exit 1
            fi
          fi

      # ── 4b. Vérifier que types.ts correspond à la base (post-migration) ───
      # Les migrations viennent d'être appliquées : la base contient désormais
      # les nouvelles tables. types.ts committé DOIT correspondre — sinon on a
      # oublié de régénérer (`npm run gen:types`). Échec visible, aucun commit.
      - name: Setup Node (vérif types)
        if: steps.push.outputs.success == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vérifier que types.ts correspond à la base
        if: steps.push.outputs.success == 'true' && github.event.inputs.dry_run != 'true'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/check-supabase-types.mjs

      # ── 5. GitHub Step Summary ────────────────────────────────────────────
      - name: Generate summary
        if: always()
        run: |
          PUSH_OK="${{ steps.push.outputs.success }}"
          MIGS=$(ls supabase/migrations/*.sql | wc -l)
          STATUS_EMOJI="✅"
          [ "$PUSH_OK" != "true" ] && STATUS_EMOJI="❌"

          cat >> "$GITHUB_STEP_SUMMARY" <<MARKDOWN
          ## ${STATUS_EMOJI} Supabase Migrations

          | | |
          |---|---|
          | **Status** | ${PUSH_OK:-false} |
          | **Migrations locales** | ${MIGS} |
          | **Commit** | \`${{ github.sha }}\` |
          | **Branche** | \`${{ github.ref_name }}\` |

          ### Dernières migrations
          \`\`\`
          $(ls -t supabase/migrations/*.sql | head -5 | xargs -I{} basename {} | sed 's/^/  /')
          \`\`\`
          MARKDOWN
